<p-dialog
  [visible]="visible()"
  header="Set up weekly schedule"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '440px' }"
  (visibleChange)="onVisibleChange($event)"
>
  <form class="flex flex-col gap-5 py-1" [formGroup]="scheduleDaysForm">
    <div class="flex flex-col gap-y-1">
      <label class="block">Default clock in</label>
      <p-datepicker
        formControlName="startTime"
        [timeOnly]="true"
        hourFormat="12"
        [showIcon]="true"
        icon="pi pi-clock"
        placeholder="e.g. 8:00 AM"
        class="w-full"
      />
    </div>

    <div class="flex flex-col gap-y-1">
      <label class="block">Default clock out</label>
      <p-datepicker
        formControlName="endTime"
        [timeOnly]="true"
        hourFormat="12"
        [showIcon]="true"
        icon="pi pi-clock"
        placeholder="e.g. 5:00 PM"
        class="w-full"
      />
    </div>
    <p class="text-xs">Specfic clock in and clock out per day is available during edit</p>

    <div class="flex flex-col gap-y-1">
      <label class="block">Break Minutes</label>
      <p-inputnumber inputId="integeronly" formControlName="breakMinutes" class="w-full" />
    </div>

    <div class="flex flex-col gap-y-1">
      <label>Rest days</label>
      <div class="flex flex-wrap gap-1.5 mb-1">
        @for (day of dayOptions; track day.value) {
          <p-button
            [label]="day.label"
            (click)="toggleRestDay(day.value)"
            [severity]="
              scheduleDaysForm.controls.restDays.value?.includes(day.value)
                ? 'primary'
                : 'secondary'
            "
            size="small"
          />
        }
      </div>
      <p class="text-xs">Selected days will be marked as rest days.</p>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      severity="secondary"
      [text]="true"
      (click)="onVisibleChange(false)"
      size="small"
    />
    <p-button
      label="Create schedule"
      (onClick)="saveSetup()"
      size="small"
      [disabled]="!scheduleDaysForm.valid"
    />
  </ng-template>
</p-dialog>
